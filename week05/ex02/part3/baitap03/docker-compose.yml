services:
  flask1:
    build: ./flask-app
    environment:
      INSTANCE_NAME: flask1
    networks: [lb_net]
  flask2:
    build: ./flask-app
    environment:
      INSTANCE_NAME: flask2
    networks: [lb_net]
  nginx:
    image: nginx:latest
    depends_on: [flask1, flask2]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [lb_net]
networks:
  lb_net:
    driver: bridge
