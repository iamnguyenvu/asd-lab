services:
  nextcloud:
    image: nextcloud:latest
    ports:
      - "8090:80"
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ncuser
      MYSQL_PASSWORD: ncpass
      REDIS_HOST: redis
    depends_on: [mariadb, redis]
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ncuser
      MYSQL_PASSWORD: ncpass
    volumes:
      - mariadb_data:/var/lib/mysql
  redis:
    image: redis:latest
volumes:
  mariadb_data:
