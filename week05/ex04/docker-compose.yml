services:
  ex03-db:
    image: postgres:16-alpine
    container_name: ex03-db
    environment:
      POSTGRES_DB: ex03db
      POSTGRES_USER: ex03user
      POSTGRES_PASSWORD: ex03pass
    ports:
      - "5433:5432"
    volumes:
      - ex03_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ex03user -d ex03db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ex03-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ex03-backend
    depends_on:
      ex03-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://ex03-db:5432/ex03db
      SPRING_DATASOURCE_USERNAME: ex03user
      SPRING_DATASOURCE_PASSWORD: ex03pass
    ports:
      - "8083:8083"

  ex03-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8083/api
    container_name: ex03-frontend
    depends_on:
      - ex03-backend
    ports:
      - "4173:80"

volumes:
  ex03_pgdata:
