spring.application.name=order-service
server.port=${SERVER_PORT:8092}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ex04db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ex04user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ex04pass}

catalog.service.base-url=${CATALOG_SERVICE_BASE_URL:http://localhost:8091/api/catalog/items}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
