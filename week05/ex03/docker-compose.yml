services:
  postgres:
    image: postgres:16-alpine
    container_name: ex03-postgres
    environment:
      POSTGRES_DB: ex03db
      POSTGRES_USER: ex03user
      POSTGRES_PASSWORD: ex03pass
    ports:
      - "5432:5432"
    volumes:
      - ex03_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ex03user -d ex03db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ex03-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ex03-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ex03db
      SPRING_DATASOURCE_USERNAME: ex03user
      SPRING_DATASOURCE_PASSWORD: ex03pass
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

volumes:
  ex03_pgdata:
