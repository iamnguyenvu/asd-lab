<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plugin-based CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="shell">
      <header class="hero">
        <p class="eyebrow">ASD LAB - WEEK 04</p>
        <h1>Plugin-based CMS</h1>
        <p>Layered architecture plus microkernel plugins in one runnable demo.</p>
      </header>

      <section class="panel">
        <h2>Create Draft Content</h2>
        <form id="content-form">
          <label>
            Title
            <input id="title" name="title" required maxlength="180" />
          </label>
          <label>
            Slug (optional)
            <input id="slug" name="slug" />
          </label>
          <label>
            Body
            <textarea id="body" name="body" rows="6" required></textarea>
          </label>
          <button type="submit">Save Draft</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Installed Plugins</h2>
          <button id="refresh-plugins" class="secondary">Refresh</button>
        </div>
        <div id="plugins"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Content List</h2>
          <button id="refresh-contents" class="secondary">Refresh</button>
        </div>
        <div id="content-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
